# mcm_example.yaml
# -----------------
# Override for MCM-format files: *_FC*.xlsx with 'Record' sheet, header on row 3.
#
# Copy this file to harmonize/overrides/ and adjust match_pattern to your filenames.
# The override is ADDITIVE — it only patches what auto-detection cannot handle.

match_pattern: "*MCM*_FC*.xlsx"
description: "MCM standard format — FC cell IDs, tab-sep .xls or xlsx"

# Force specific sheet (optional — remove if auto-detection works)
sheet: "Record"

# Force header row 1-based (optional — remove if auto-detection works)
header_row: 3

column_overrides:

  Total_time_s:
    source: "Test Time"
    # MCM uses '0d 08:47:57.31' format — tell TimeFormatDetector explicitly
    time_format: "d_hms_ms"

  Current_A:
    source: "Current(A)"
    # MCM current is always positive; 'Step Type' column holds 'C', 'D', 'R'
    direction_convention: "unipolar_with_state_col"
    direction_state_col: "Step Type"
    direction_discharge_vals: ["D", "d", "Discharge", "discharge"]

  Capacity_step_Ah:
    source: "Capacity(Ah)"
    capacity_convention: "direct_unsigned"

  # Uncomment and adjust if needed:
  # Voltage_V:
  #   source: "Voltage(V)"

  # Step:
  #   source: "Step Index"

  # Step_name:
  #   source: "Step Type"

  # Cycle:
  #   source: "Cycle Index"

  # Date_time:
  #   source: "Date"
